lyrics:
  Sanctorum Martyrum triumphos\\
  et trophea recolamus\\
  qui contemptis mundi deliciis\\
  cruces et mortes pertulerunt.\\[1ex]
  Ovantes Christi Martyrum\\
  gesta miranda canimus\\
  quorum tormenta corporum\\
  acerba fuisse cernimus.\\[1ex]
  Athleta Christi Placidus\\
  poenas pro Christo fortiter\\
  et flavia cum fratribus\\
  mortem ferunt alacriter.
