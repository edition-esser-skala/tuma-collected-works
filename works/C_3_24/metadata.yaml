lyrics:
  Vasti per orbem canitur\\
  sacrum schema certaminis,\\
  monachorum extollitur\\
  praecelsi decus ordinis.\\[1ex]
  Nostri sunt decus ordinis,\\
  nostri sunt decus agminis,\\
  nostrique naevos criminis\\
  absterge Rex certaminis.
