lyrics:
  In columbae specie\\
  Scholasticae anima visa est,\\
  fraterna mens laetata est.\\[1ex]
  Te beata sponsa Christi,\\
  te columba virginum\\
  syderum tollunt coloni\\
  laudibus Scholastica,\\
  nostra te laetis salutant\\
  vocibus praecordia.\\[1ex]
  Ora sponsum nos salvari maritis\\
  et illustrari\\
  et super nivem dealbari,\\[1ex]
  in coelis collocari.
