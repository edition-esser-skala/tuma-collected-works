lyrics:
  Exaudivit de templo sancto suo vocem meam alleluia,\\
  et clamor meus in conspectu eius introivit in aures eius alleluia.\\
  Diligam te Domine virtus mea:\\
  Dominus firmamentum meum et refugium meum et liberator meus.\\[1ex]
  (\bibleverse{Ps}(18/17:7,2,3))
